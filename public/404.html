<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance - The Billiards Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --felt-green: #0a2d22;
      --felt-dark: #051611;
      --brass-gold: #c9a24b;
      --brass-light: #e5c173;
      --chalk-light: #f7f9f8;
      --chalk-dim: #b8c4bf;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--felt-dark);
      color: var(--chalk-light);
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    
    .background-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('/snooker_background.png');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35) contrast(1.1);
      z-index: 1;
    }
    
    .vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, transparent 20%, rgba(5, 22, 17, 0.8) 80%);
      z-index: 2;
    }
    
    .card-container {
      position: relative;
      z-index: 10;
      max-width: 520px;
      width: 90%;
      background: rgba(10, 45, 34, 0.25);
      border: 1px solid rgba(201, 162, 75, 0.25);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: floatAnimation 6s ease-in-out infinite, fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    
    @keyframes floatAnimation {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0px); }
    }
    
    .icon-wrapper {
      margin-bottom: 28px;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon-ring {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px dashed rgba(201, 162, 75, 0.4);
      animation: spin 20s linear infinite;
    }
    
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    
    .icon {
      width: 72px;
      height: 72px;
      background: rgba(201, 162, 75, 0.15);
      border: 1.5px solid var(--brass-gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--brass-light);
      font-size: 2.2rem;
      text-shadow: 0 0 8px rgba(201, 162, 75, 0.5);
      box-shadow: 0 0 20px rgba(201, 162, 75, 0.2);
    }
    
    .title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--chalk-light);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    
    .message {
      font-size: 1.05rem;
      color: var(--chalk-dim);
      line-height: 1.6;
      margin-bottom: 32px;
      font-weight: 400;
    }
    
    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--brass-gold), transparent);
      margin: 0 auto 28px;
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(74, 222, 128, 0.1);
      border: 1.5px solid rgba(74, 222, 128, 0.25);
      color: #4ade80;
      padding: 8px 16px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    
    .pulse-dot {
      width: 8px;
      height: 8px;
      background-color: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 8px #4ade80;
      animation: pulse 1.8s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 12px #4ade80; }
      100% { transform: scale(0.9); opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div class="background-overlay"></div>
  <div class="vignette"></div>
  
  <div class="card-container">
    <div class="icon-wrapper">
      <div class="icon-ring"></div>
      <div class="icon">🎱</div>
    </div>
    
    <h1 class="title">Billiards Arena Console</h1>
    <div class="divider"></div>
    <p class="message">Don't worry, we are working on the issue and it will be resolved very soon.</p>
    
    <div class="status-badge">
      <span class="pulse-dot"></span>
      Updates Pushing
    </div>
  </div>
</body>
</html>
